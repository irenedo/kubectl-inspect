apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: inspect
spec:
  version: {{ .TagName }}
  homepage: https://github.com/irenedo/kubectl-inspect
  shortDescription: Browse Kubernetes resources interactively with a TUI tree browser
  description: |
    An interactive terminal UI for browsing Kubernetes resource and CRD field
    structures. Instead of typing kubectl explain repeatedly, use the collapsible
    tree view to explore fields and see full explain output in real-time.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    {{addURIAndSha "https://github.com/irenedo/kubectl-inspect/releases/download/{{ .TagName }}/kubectl-inspect_{{ .TagName }}_darwin_amd64.tar.gz" .TagName }}
    bin: kubectl-inspect
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    {{addURIAndSha "https://github.com/irenedo/kubectl-inspect/releases/download/{{ .TagName }}/kubectl-inspect_{{ .TagName }}_darwin_arm64.tar.gz" .TagName }}
    bin: kubectl-inspect
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    {{addURIAndSha "https://github.com/irenedo/kubectl-inspect/releases/download/{{ .TagName }}/kubectl-inspect_{{ .TagName }}_linux_amd64.tar.gz" .TagName }}
    bin: kubectl-inspect
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    {{addURIAndSha "https://github.com/irenedo/kubectl-inspect/releases/download/{{ .TagName }}/kubectl-inspect_{{ .TagName }}_linux_arm64.tar.gz" .TagName }}
    bin: kubectl-inspect
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    {{addURIAndSha "https://github.com/irenedo/kubectl-inspect/releases/download/{{ .TagName }}/kubectl-inspect_{{ .TagName }}_windows_amd64.tar.gz" .TagName }}
    bin: kubectl-inspect.exe
