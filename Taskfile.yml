version: '3'

vars:
  BINARY: kubectl-inspect
  GOLANGCI_LINT_VERSION: 2.11.4
  TRIVY_VERSION: 0.69.3
  ACTIONLINT_VERSION: 1.7.12
  KUBECTL_VERSION: 1.35.0
  KIND_VERSION: 0.31.0

tasks:

  build:
    desc: Build the binary
    cmds:
      - go build -o {{.BINARY}} .

  test:
    desc: Run all tests
    cmds:
      - go test ./... -v

  test-cover:
    desc: Run tests with coverage
    cmds:
      - go test ./... -coverprofile=coverage.out
      - go tool cover -html=coverage.out -o coverage.html

  install:
    desc: Build and install to GOPATH/bin
    cmds:
      - go build -o {{.BINARY}} .
      - mv {{.BINARY}} $(go env GOPATH)/bin/

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -f {{.BINARY}} coverage.out coverage.html

  lint:install:
    desc: Install golangci-lint
    status:
      - test -f ./bin/golangci-lint
    cmds:
      - GOBIN={{.ROOT_DIR}}/bin go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v{{.GOLANGCI_LINT_VERSION}}

  lint:
    desc: Run golangci-lint with all configured linters
    deps:
      - lint:install
    cmds:
      - ./bin/golangci-lint run ./...

  trivy:install:
    desc: Install trivy
    status:
      - test -f ./bin/trivy
    cmds:
      - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b ./bin v{{.TRIVY_VERSION}}

  trivy:
    desc: Check for vulnerabilities in dependencies
    deps:
      - trivy:install
    cmds:
      - ./bin/trivy fs go.mod

  check:
    desc: Run all checks before publishing (lint, test, trivy, workflow lint, security scan)
    cmds:
      - task: lint
      - task: test
      - task: trivy
      - task: actionlint

  actionlint:install:
    desc: Install actionlint
    status:
      - test -f ./bin/actionlint
    cmds:
      - GOBIN={{.ROOT_DIR}}/bin go install github.com/rhysd/actionlint/cmd/actionlint@v{{.ACTIONLINT_VERSION}}

  actionlint:
    desc: Lint GitHub Actions workflows
    deps:
      - actionlint:install
    cmds:
      - ./bin/actionlint .github/workflows/*.yaml

  kind:install:
    desc: Install kind
    status:
        - test -f ./bin/kind
    cmds:
        - GOOS=$(go env GOOS); GOARCH=$(go env GOARCH); curl -fsSL "https://github.com/kubernetes-sigs/kind/releases/download/v{{.KIND_VERSION}}/kind-${GOOS}-${GOARCH}" > ./bin/kind
        - chmod +x ./bin/kind

  kubectl:install:
    desc: Install kubectl
    status:
         - test -f ./bin/kubectl
    cmds:
         - GOOS=$(go env GOOS); GOARCH=$(go env GOARCH); curl -fsSL "https://dl.k8s.io/release/v{{.KUBECTL_VERSION}}/bin/${GOOS}/${GOARCH}/kubectl" > ./bin/kubectl
         - chmod +x ./bin/kubectl

  integration:
    desc: Run integration tests against kind clusters (multiple k8s versions)
    deps:
        - kind:install
        - kubectl:install
    cmds:
        - PATH="{{.ROOT_DIR}}/bin:{{.PATH}}" go test -v -timeout 30m -tags=integration ./...
