apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: inspect
  version: v0.1.0
  spec:
    version: v0.1.0
    shortDescription: Browse Kubernetes resources interactively with a TUI tree browser
    description: |
      An interactive terminal UI for browsing Kubernetes resource and CRD field
      structures. Instead of typing kubectl explain repeatedly, use the collapsible
      tree view to explore fields and see full explain output in real-time.
    homepage: https://github.com/irenedo/kubectl-inspect
    platforms:
      - selector:
          matchLabels:
            os: linux
            arch: amd64
        uri: https://github.com/irenedo/kubectl-inspect/releases/download/{{.Version}}/kubectl-inspect-linux-amd64
        sha256: {{.AssetChecksum}}
        files:
          - from: kubectl-inspect-linux-amd64
            to: kubectl-inspect
      - selector:
          matchLabels:
            os: linux
            arch: arm64
        uri: https://github.com/irenedo/kubectl-inspect/releases/download/{{.Version}}/kubectl-inspect-linux-arm64
        sha256: {{.AssetChecksum}}
        files:
          - from: kubectl-inspect-linux-arm64
            to: kubectl-inspect
      - selector:
          matchLabels:
            os: darwin
            arch: amd64
        uri: https://github.com/irenedo/kubectl-inspect/releases/download/{{.Version}}/kubectl-inspect-darwin-amd64
        sha256: {{.AssetChecksum}}
        files:
          - from: kubectl-inspect-darwin-amd64
            to: kubectl-inspect
      - selector:
          matchLabels:
            os: darwin
            arch: arm64
        uri: https://github.com/irenedo/kubectl-inspect/releases/download/{{.Version}}/kubectl-inspect-darwin-arm64
        sha256: {{.AssetChecksum}}
        files:
          - from: kubectl-inspect-darwin-arm64
            to: kubectl-inspect
      - selector:
          matchLabels:
            os: windows
            arch: amd64
        uri: https://github.com/irenedo/kubectl-inspect/releases/download/{{.Version}}/kubectl-inspect-windows-amd64.exe
        sha256: {{.AssetChecksum}}
        files:
          - from: kubectl-inspect-windows-amd64.exe
            to: kubectl-inspect.exe
