name: CI

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - edited

env:
  KUBECTL_VERSION: 1.35.0
  KIND_VERSION: 0.31.0

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install Task
        run: |
          curl -sfL https://taskfile.dev/install.sh | sh
          sudo mv bin/task /usr/local/bin/

      - name: Validate code
        run: task check

  integration:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install kind
        run: |
          curl -fsSL -o kind "https://kind.sigs.k8s.io/dl/v${{ env.KIND_VERSION }}/kind-linux-amd64"
          chmod +x kind
          sudo mv kind /usr/local/bin/

      - name: Install kubectl
        run: |
          curl -fsSL -o kubectl "https://dl.k8s.io/release/v${{ env.KUBECTL_VERSION }}/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Install Task
        run: |
          curl -sfL https://taskfile.dev/install.sh | sh
          sudo mv bin/task /usr/local/bin/

      - name: Run integration tests
        run: task integration
