name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install Task
        run: |
          curl -sfL https://taskfile.dev/install.sh | sh
          sudo mv bin/task /usr/local/bin/

      - name: Validate code
        run: task check

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          Extension=""
          if [ "$GOOS" == "windows" ]; then
            Extension=".exe"
          fi
          go build -o "dist/kubectl-inspect-${GOOS}-${GOARCH}${Extension}" .

      - name: Get version
        id: version
        run: |
          echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Create source archive
        run: |
          mv dist kubectl-inspect-${{ steps.version.outputs.version }}
          tar -czf kubectl-inspect-${{ steps.version.outputs.version }}.tar.gz kubectl-inspect-${{ steps.version.outputs.version }}
          zip -r kubectl-inspect-${{ steps.version.outputs.version }}.zip kubectl-inspect-${{ steps.version.outputs.version }}
          rm -rf kubectl-inspect-${{ steps.version.outputs.version }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            kubectl-inspect-${{ steps.version.outputs.version }}.tar.gz
            kubectl-inspect-${{ steps.version.outputs.version }}.zip
            dist/*
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ### Installation via krew
            
            ```bash
            kubectl krew install inspect
            ```
            
            Or build manually:
            ```bash
            go install github.com/irenedo/kubectl-inspect@${{ steps.version.outputs.version }}
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
